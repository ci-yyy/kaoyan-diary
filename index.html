<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 考研日记 · 倒计时</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Notification -->
<div class="notification" id="notification" role="status" aria-live="polite"></div>

<!-- ===== Header ===== -->
<header class="header" role="banner">
  <div class="header-top">
    <div class="header-left">
      <h1 class="header-title">📚 <span>考研</span>日记</h1>
      <span class="header-sep" aria-hidden="true">|</span>
      <div class="hg-school">
        <span aria-hidden="true">🏫</span>
        <input type="text" id="goalSchool" placeholder="目标院校" maxlength="50" class="auto-width" aria-label="目标院校">
        <span style="color:var(--ink-lighter);font-size:11px;" aria-hidden="true">·</span>
        <input type="text" id="goalMajor" placeholder="目标专业" maxlength="50" class="auto-width" aria-label="目标专业">
      </div>
      <div class="hg-subjects" id="headerGoalSubjects" role="group" aria-label="科目目标分数"></div>
      <span class="header-sep" aria-hidden="true">|</span>
      <span class="hg-subject" style="background:var(--gold-light);border-color:rgba(201,168,76,0.3);padding:1px 6px;">🎯 总分 <span id="goalTotalScore" style="font-weight:600;color:var(--ink);">0</span></span>
    </div>
    <div class="header-right">
      <div class="datetime" id="datetime" aria-live="off">
        <span class="date-part" id="datePart"></span>
        <span class="time-part" id="timePart">19:30</span>
      </div>
      <button class="header-btn" id="themeToggle" title="切换主题" aria-label="切换到深色主题">🌙</button>
    </div>
  </div>
</header>

<!-- ===== App ===== -->
<div class="app">

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar-col" role="complementary" aria-label="侧边栏">

    <!-- Countdown -->
    <div class="card countdown-card" role="region" aria-label="考研倒计时">
      <h2 class="card-title">⏳ 考研倒计时</h2>
      <div class="countdown-num" id="countdownNum" aria-live="polite">206</div>
      <div class="countdown-unit">天</div>
      <div class="countdown-label">还剩 <span id="countdownWeeks">29</span> 周 · <span id="countdownHours">4944</span> 小时</div>
      <div class="countdown-exam-date" id="examDateDisplay">📅 2026年12月19日 · 星期六</div>
    </div>

    <!-- Diary Entries -->
    <nav class="card" role="navigation" aria-label="日记索引">
      <h2 class="card-title">📖 日记索引</h2>
      <input class="entry-search" id="entrySearch" placeholder="🔍 搜索日记…" autocomplete="off" aria-label="搜索日记内容">
      <div class="entry-list" id="entryList" role="list" aria-label="日记列表"></div>
    </nav>

    <!-- Progress Timeline -->
    <div class="card" role="region" aria-label="学习进度">
      <h2 class="card-title">📊 学习进度</h2>
      <div class="subject-mini-list" id="subjectMiniList" style="margin-bottom:8px;padding-bottom:6px;border-bottom:1px dashed var(--paper-border);" aria-label="今日科目明细"></div>
      <div style="margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:2px;">
          <span>总复习进度</span>
          <span id="sideTotalProgress">0 小时</span>
        </div>
        <div class="prog-bar-bg" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="总复习进度">
          <div class="prog-bar-fill" id="sideTotalBar" style="width:0%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--ink-lighter);margin-top:2px;">
          <span id="sideTotalDays">已学习 0 天</span>
          <span id="sideTotalPercent">0%</span>
        </div>
      </div>
      <div style="font-size:10px;color:var(--ink-light);margin-bottom:3px;font-family:-apple-system,sans-serif;text-transform:uppercase;letter-spacing:0.04em;">
        ⏱ 今日时间线 · <span id="sideDailyProgress">0 分钟</span>
      </div>
      <div id="timelineList" style="font-size:12px;line-height:1.8;max-height:120px;overflow-y:auto;" aria-label="今日学习时间线">
        <div style="color:var(--ink-lighter);font-style:italic;text-align:center;padding:8px 0;">还没有学习记录</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;flex-wrap:wrap;gap:4px;">
        <button class="weekly-toggle" id="weeklyToggle" aria-expanded="false" aria-controls="weeklyReport">📅 本周统计</button>
        <div class="export-row">
          <button class="export-btn" id="exportJSON" aria-label="导出JSON备份">JSON</button>
          <button class="export-btn" id="exportTXT" aria-label="导出文本格式">TXT</button>
        </div>
      </div>
      <div id="weeklyReport" style="display:none;margin-top:6px;" aria-live="polite"></div>

      <!-- 8.8: Chart containers -->
      <div class="viz-section" id="vizBarSection" style="display:none;">
        <div class="viz-section-title">📊 本周每日时长</div>
        <div id="chartBarWeek"></div>
      </div>
      <div class="viz-section" id="vizDistSection" style="display:none;">
        <div class="viz-section-title">🎯 今日科目分布</div>
        <div id="chartSubjectDist"></div>
      </div>

      <!-- 8.6: Storage info + cleanup -->
      <div class="storage-info" id="storageInfo" style="margin-top:8px;"></div>
      <div style="display:flex;gap:4px;margin-top:4px;">
        <button class="export-btn" id="cleanupDataBtn" style="flex:1;" aria-label="清理30天前的学习记录明细">🧹 清理旧数据</button>
      </div>
    </div>

  </aside>

  <!-- ===== Main Column ===== -->
  <main role="main" aria-label="日记主区域">

    <div class="card">
      <!-- Navigation -->
      <div class="diary-nav" role="navigation" aria-label="日记日期导航">
        <div>
          <span class="diary-nav-date" id="diaryDate">6月3日</span>
          <span class="diary-nav-weekday" id="diaryWeekday">星期三 · 第 1 天</span>
        </div>
        <div class="diary-nav-btns">
          <button id="navPrev" aria-label="前一天">‹ 前一天</button>
          <button class="primary" id="navToday" aria-label="回到今天">今天</button>
          <button id="navNext" aria-label="后一天">后一天 ›</button>
        </div>
      </div>

      <!-- Study Subjects Timer -->
      <h2 class="card-title" style="margin-bottom:8px;">🎯 今日学习</h2>
      <div class="study-tracker" id="subjectGrid" role="group" aria-label="科目计时卡片">
        <!-- Generated by JS -->
      </div>

      <!-- Diary + Todo two-column -->
      <div style="display:grid;grid-template-columns:1fr 200px;gap:16px;margin-top:6px;">
        <!-- Left: Diary editor -->
        <div class="diary-editor-wrap">
          <textarea id="diaryText" placeholder="今天学了什么？有什么收获和感悟？&#10;把每天的进步记录下来…" maxlength="10000" aria-label="日记编辑区"></textarea>
          <div class="diary-footer" style="margin-top:4px;">
            <div class="diary-footer-left">
              <span class="diary-meta" id="wordCount">0 字</span>
              <span class="diary-save-status" id="diarySaveStatus" role="status">✓ 已保存</span>
            </div>
            <div style="display:flex;gap:6px;align-items:center;">
              <span style="font-size:12px;color:var(--ink-lighter);font-family:-apple-system,sans-serif;font-style:italic;" id="quoteBar">每一个努力的今天，都会在十二月开花结果</span>
              <button class="diary-save-btn" id="diarySaveBtn">💾 保存</button>
            </div>
          </div>
        </div>
        <!-- Right: Todo -->
        <div style="border-left:1px dashed var(--paper-border);padding-left:14px;" role="region" aria-label="任务列表">
          <!-- 通用任务 -->
          <div class="todo-section">
            <h2 class="todo-section-title">📋 通用任务</h2>
            <div class="todo-input-wrap">
              <input class="todo-input" id="todoGeneralInput" placeholder="新任务…" maxlength="120" autocomplete="off" aria-label="输入通用任务">
              <button class="todo-add-btn" id="addGeneralBtn" style="width:28px;height:28px;font-size:14px;" aria-label="添加通用任务">+</button>
            </div>
            <ul class="todo-list" id="todoGeneralList" style="max-height:130px;" role="list" aria-label="通用任务列表">
              <li class="todo-empty">还没有通用任务 ✨</li>
            </ul>
          </div>
          <!-- 当天任务 -->
          <div class="todo-section">
            <h2 class="todo-section-title">📅 当天任务</h2>
            <div class="todo-input-wrap">
              <input class="todo-input" id="todoDailyInput" placeholder="新任务…" maxlength="120" autocomplete="off" aria-label="输入当天任务">
              <button class="todo-add-btn" id="addDailyBtn" style="width:28px;height:28px;font-size:14px;" aria-label="添加当天任务">+</button>
            </div>
            <ul class="todo-list" id="todoDailyList" style="max-height:130px;" role="list" aria-label="当天任务列表">
              <li class="todo-empty">还没有当天任务 ✨</li>
            </ul>
          </div>
        </div>
      </div>

    </div>

  </main>

</div>

<script src="app.js?v=2" defer></script>
</body>
</html>
